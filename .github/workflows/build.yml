name: Build APK

on:
  push:
    branches: [ 'claude/**' , 'main', 'master' ]
  pull_request:
    branches: [ 'main', 'master' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get short SHA
      id: slug
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Rename APKs
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ChineseChess-debug-${{ steps.slug.outputs.sha }}.apk
        cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/ChineseChess-release-${{ steps.slug.outputs.sha }}.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.slug.outputs.sha }}
        name: Chinese Chess APK (${{ steps.slug.outputs.sha }})
        body: |
          自动构建的中国象棋 APK

          - **ChineseChess-debug**: 调试版，可直接安装
          - **ChineseChess-release**: 发布版（未签名）
        files: |
          app/build/outputs/apk/debug/ChineseChess-debug-${{ steps.slug.outputs.sha }}.apk
          app/build/outputs/apk/release/ChineseChess-release-${{ steps.slug.outputs.sha }}.apk
